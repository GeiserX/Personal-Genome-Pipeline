<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="helix1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#06b6d4;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="helix2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#94a3b8" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
  </g>

  <!-- DNA helix - left side -->
  <g transform="translate(60, 100)">
    <!-- Backbone strand 1 -->
    <path d="M0,-50 C15,-40 15,-20 0,-10 C-15,0 -15,20 0,30 C15,40 15,60 0,70"
          fill="none" stroke="url(#helix1)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Backbone strand 2 -->
    <path d="M30,-50 C15,-40 15,-20 30,-10 C45,0 45,20 30,30 C15,40 15,60 30,70"
          fill="none" stroke="url(#helix2)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Base pairs -->
    <line x1="3" y1="-45" x2="27" y2="-45" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="-5" y1="-28" x2="35" y2="-28" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-10" x2="30" y2="-10" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="-5" y1="8" x2="35" y2="8" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="3" y1="25" x2="27" y2="25" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <line x1="-5" y1="43" x2="35" y2="43" stroke="#8b5cf6" stroke-width="1.5" opacity="0.4"/>
    <line x1="3" y1="60" x2="27" y2="60" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
    <!-- Nucleotide dots -->
    <circle cx="0" cy="-50" r="2.5" fill="#06b6d4"/>
    <circle cx="30" cy="-50" r="2.5" fill="#8b5cf6"/>
    <circle cx="0" cy="-10" r="2.5" fill="#06b6d4"/>
    <circle cx="30" cy="-10" r="2.5" fill="#8b5cf6"/>
    <circle cx="0" cy="30" r="2.5" fill="#06b6d4"/>
    <circle cx="30" cy="30" r="2.5" fill="#8b5cf6"/>
    <circle cx="0" cy="70" r="2.5" fill="#06b6d4"/>
    <circle cx="30" cy="70" r="2.5" fill="#8b5cf6"/>
  </g>

  <!-- DNA helix - right side (mirrored) -->
  <g transform="translate(810, 100)">
    <path d="M0,-50 C15,-40 15,-20 0,-10 C-15,0 -15,20 0,30 C15,40 15,60 0,70"
          fill="none" stroke="url(#helix2)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M30,-50 C15,-40 15,-20 30,-10 C45,0 45,20 30,30 C15,40 15,60 30,70"
          fill="none" stroke="url(#helix1)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3" y1="-45" x2="27" y2="-45" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-5" y1="-28" x2="35" y2="-28" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="0" y1="-10" x2="30" y2="-10" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-5" y1="8" x2="35" y2="8" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="3" y1="25" x2="27" y2="25" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="-5" y1="43" x2="35" y2="43" stroke="#06b6d4" stroke-width="1.5" opacity="0.4"/>
    <line x1="3" y1="60" x2="27" y2="60" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="-50" r="2.5" fill="#8b5cf6"/>
    <circle cx="30" cy="-50" r="2.5" fill="#06b6d4"/>
    <circle cx="0" cy="-10" r="2.5" fill="#8b5cf6"/>
    <circle cx="30" cy="-10" r="2.5" fill="#06b6d4"/>
    <circle cx="0" cy="30" r="2.5" fill="#8b5cf6"/>
    <circle cx="30" cy="30" r="2.5" fill="#06b6d4"/>
    <circle cx="0" cy="70" r="2.5" fill="#8b5cf6"/>
    <circle cx="30" cy="70" r="2.5" fill="#06b6d4"/>
  </g>

  <!-- Pipeline arrow visualization -->
  <g transform="translate(450, 155)" opacity="0.15">
    <rect x="-300" y="-3" width="600" height="6" rx="3" fill="url(#accent)"/>
    <!-- Step dots along pipeline -->
    <circle cx="-280" cy="0" r="4" fill="#06b6d4"/>
    <circle cx="-240" cy="0" r="4" fill="#06b6d4"/>
    <circle cx="-200" cy="0" r="4" fill="#14b8a6"/>
    <circle cx="-160" cy="0" r="4" fill="#14b8a6"/>
    <circle cx="-120" cy="0" r="4" fill="#22c55e"/>
    <circle cx="-80" cy="0" r="4" fill="#22c55e"/>
    <circle cx="-40" cy="0" r="4" fill="#eab308"/>
    <circle cx="0" cy="0" r="4" fill="#eab308"/>
    <circle cx="40" cy="0" r="4" fill="#f97316"/>
    <circle cx="80" cy="0" r="4" fill="#f97316"/>
    <circle cx="120" cy="0" r="4" fill="#8b5cf6"/>
    <circle cx="160" cy="0" r="4" fill="#8b5cf6"/>
    <circle cx="200" cy="0" r="4" fill="#ec4899"/>
    <circle cx="240" cy="0" r="4" fill="#ec4899"/>
    <circle cx="280" cy="0" r="4" fill="#ef4444"/>
  </g>

  <!-- Title -->
  <text x="450" y="72" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="42" font-weight="700" fill="#f8fafc" letter-spacing="-1">
    Personal Genome Pipeline
  </text>

  <!-- Subtitle -->
  <text x="450" y="105" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#94a3b8" letter-spacing="0.5">
    Whole Genome Sequencing Analysis on Consumer Hardware
  </text>

  <!-- Tag line -->
  <text x="450" y="130" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#64748b">
    27 steps  |  100% local  |  Docker-powered  |  Free &amp; open source
  </text>
</svg>
