name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run ShellCheck on all scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: scripts
          severity: warning

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install actionlint
        run: |
          bash <(curl -sS https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          echo "$(pwd)" >> "$GITHUB_PATH"

      - name: Run actionlint
        run: actionlint -color

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.21.2
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar xz -C /usr/local/bin gitleaks

      - name: Run gitleaks
        run: gitleaks detect --source . --verbose

  no-personal-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for personal paths or data leaks
        run: |
          echo "Scanning for personal data in scripts and docs..."
          FAIL=0
          # Check for common personal path patterns
          if grep -rn '/mnt/user\|/home/[a-z]' scripts/ docs/ 2>/dev/null; then
            echo "FAIL: Found personal paths in scripts/docs"
            FAIL=1
          fi
          # Check for hardcoded hostnames
          if grep -rn 'internal-host\|internal-host\|ts\.net' scripts/ docs/ 2>/dev/null; then
            echo "FAIL: Found hardcoded hostnames"
            FAIL=1
          fi
          # Check for hardcoded sample names (but allow 'your_name' placeholders)
          if grep -rn 'SAMPLE=sample1\|SAMPLE=sample2' scripts/ docs/ 2>/dev/null; then
            echo "FAIL: Found hardcoded sample names"
            FAIL=1
          fi
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi
          echo "OK: No personal data found"

  markdown-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check for broken internal links
        run: |
          echo "Checking internal markdown links..."
          rm -f /tmp/link_fail
          for md in docs/*.md README.md; do
            # Extract markdown links: [text](target)
            grep -oP '\]\([^)]+\)' "$md" 2>/dev/null | \
              grep -oP '\(([^)]+)\)' | tr -d '()' | \
              grep -v '^http' | grep -v '^#' | \
              while read -r link; do
                file=$(echo "$link" | cut -d'#' -f1)
                if [ -n "$file" ]; then
                  dir=$(dirname "$md")
                  target="${dir}/${file}"
                  if [ ! -f "$target" ]; then
                    echo "BROKEN: ${md} -> ${link} (file not found: ${target})"
                    echo "1" > /tmp/link_fail
                  fi
                fi
              done
          done
          if [ -f /tmp/link_fail ]; then
            exit 1
          fi
          echo "OK: All internal links valid"

  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Verify versions.env images match scripts
        run: |
          echo "Checking versions.env against setup.sh and scripts..."
          FAIL=0

          # Source versions.env
          . ./versions.env

          # Check that key images used in scripts match versions.env
          check_image() {
            local script="$1" expected="$2" label="$3"
            if [ -f "$script" ] && ! grep -qF "$expected" "$script"; then
              echo "FAIL: ${label} not found in ${script} (expected: ${expected})"
              FAIL=1
            fi
          }

          check_image scripts/15-duphold.sh "$DUPHOLD_IMAGE" "DUPHOLD_IMAGE"
          check_image scripts/05-annotsv.sh "$ANNOTSV_IMAGE" "ANNOTSV_IMAGE"
          check_image scripts/chip-to-vcf.sh "$PICARD_IMAGE" "PICARD_IMAGE"

          if [ "$FAIL" -eq 0 ]; then
            echo "OK: versions.env is consistent with scripts"
          fi
          exit "$FAIL"
